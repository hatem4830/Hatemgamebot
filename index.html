<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ichancy Bot - عجلة الحظ الذهبية</title>
  <style>
    /* ALL YOUR ORIGINAL CSS STYLES EXACTLY AS THEY ARE */
    :root{--bg1:#0b2f8f;--bg2:#071b63;--blueA:#1b51e7;--blueB:#dff5ff;--text:#ffffff;--gold1:#ffe27a;--gold2:#ffc107;--lime1:#efff9d;--lime2:#b9ef00;--result:#d8ff79;}
    *{box-sizing:border-box} html,body{margin:0;min-height:100%;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at 50% 24%, rgba(255,255,255,.18), transparent 14%),radial-gradient(circle at 15% 12%, rgba(255,255,255,.10), transparent 2%),radial-gradient(circle at 82% 18%, rgba(255,255,255,.12), transparent 2%),radial-gradient(circle at 9% 68%, rgba(255,255,255,.10), transparent 1.6%),radial-gradient(circle at 90% 80%, rgba(255,255,255,.08), transparent 1.6%),linear-gradient(180deg, var(--bg1), var(--bg2));color:var(--text);overflow-x:hidden}
    .wrap{width:min(100%,760px);margin:0 auto;padding:18px 16px 28px;text-align:center} .title-en{margin:6px 0 8px;font-size:clamp(34px,8vw,62px);font-weight:900;letter-spacing:.6px;color:transparent;background:linear-gradient(180deg,#fff2a6 0%, var(--gold1) 35%, var(--gold2) 100%);-webkit-background-clip:text;background-clip:text;text-shadow:0 0 16px rgba(255,198,0,.45),0 0 30px rgba(255,198,0,.28)} .title-ar{margin:0 0 18px;font-size:clamp(28px,7vw,50px);font-weight:900;color:#f4f7ff;text-shadow:0 3px 14px rgba(0,0,0,.35)}
    .wheel-zone{position:relative;width:min(88vw,520px);height:min(88vw,520px);margin:6px auto 20px}.pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:20px solid transparent;border-right:20px solid transparent;border-top:36px solid #edf7ff;filter:drop-shadow(0 4px 10px rgba(255,255,255,.45));z-index:4}.pointer:before{content:"";position:absolute;left:-7px;top:-42px;width:14px;height:24px;border-radius:8px;background:linear-gradient(180deg,#eff7ff,#cde7ff);box-shadow:0 0 14px rgba(255,255,255,.45)}
    .halo{position:absolute;inset:28px;border-radius:50%;background:radial-gradient(circle, rgba(255,255,255,.18), rgba(255,255,255,0) 62%);filter:blur(8px);z-index:0}.ring{position:absolute;inset:18px;border-radius:50%;background:radial-gradient(circle at 50% 50%, #7fd0ff 0%, #3c7bff 40%, #0f2fae 75%, #061b6e 100%);box-shadow:0 0 25px rgba(80,150,255,.6),0 0 60px rgba(40,100,255,.45),inset 0 6px 14px rgba(255,255,255,.55),inset 0 -10px 22px rgba(0,0,0,.45);z-index:1}.inner-ring{position:absolute;inset:34px;border-radius:50%;border:8px solid rgba(120,190,255,.85);box-shadow:0 0 18px rgba(90,170,255,.8),0 0 40px rgba(60,120,255,.6),inset 0 0 10px rgba(255,255,255,.5);z-index:2;pointer-events:none}
    #wheelCanvas{position:absolute;inset:34px;width:calc(100% - 68px);height:calc(100% - 68px);border-radius:50%;z-index:2;filter:drop-shadow(0 0 18px rgba(255,255,255,.12))}.hub{position:absolute;left:50%;top:50%;width:88px;height:88px;transform:translate(-50%, -50%);border-radius:50%;background:radial-gradient(circle at 35% 30%, var(--lime1), var(--lime2) 70%);border:8px solid rgba(255,255,255,.72);box-shadow:0 0 18px rgba(198,255,0,.35), inset 0 3px 10px rgba(255,255,255,.4);z-index:3}
    .card{width:min(90%,420px);margin:0 auto 20px;background:linear-gradient(180deg, rgba(0,6,40,.88), rgba(3,12,62,.82));border:3px solid rgba(255,255,255,.5);border-radius:999px;padding:18px 20px;font-size:clamp(24px,5.4vw,42px);font-weight:900;box-shadow:inset 0 2px 10px rgba(255,255,255,.06),0 10px 28px rgba(0,0,0,.25)}
    .spin-btn{width:min(96%,620px);border:none;border-radius:26px;padding:24px 20px;font-size:clamp(30px,6vw,48px);font-weight:900;color:#fff;background:linear-gradient(180deg,#9de5ff,#4d8bff 34%,#2e63ff 75%,#2850db 100%);box-shadow:inset 0 2px 10px rgba(255,255,255,.4),0 14px 24px rgba(29,72,237,.3);cursor:pointer;transition:transform .14s ease, opacity .2s ease}.spin-btn:active{transform:scale(.985)}.spin-btn[disabled]{opacity:.55;cursor:not-allowed}
    .sound-pill{margin:18px auto 18px;width:min(74%,330px);border:none;border-radius:999px;padding:16px 22px;font-size:clamp(22px,5vw,34px);color:#eaf1ff;background:linear-gradient(180deg, rgba(109,136,255,.22), rgba(57,78,179,.28));border:1px solid rgba(255,255,255,.14);box-shadow:inset 0 2px 10px rgba(255,255,255,.04);cursor:pointer}.result-box{margin:8px auto 0;width:min(96%,650px);border-radius:28px 28px 0 0;padding:20px 18px 28px;background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));border:1px solid rgba(255,255,255,.12);border-bottom:none;min-height:120px}.result{font-size:clamp(28px,6vw,54px);font-weight:900;color:var(--result);text-shadow:0 0 14px rgba(216,255,121,.18)} .note{margin-top:8px;font-size:15px;opacity:.8}
    .sparkles{position:absolute;inset:0;pointer-events:none;z-index:5}.sparkles i{position:absolute;width:8px;height:8px;border-radius:50%;background:radial-gradient(circle, #fff6be, #ffd449 58%, transparent 62%);animation:burst 1s ease-out forwards;filter:blur(.2px)}@keyframes burst{from{transform:translate(0,0) scale(.6);opacity:0}10%{opacity:1}to{transform:translate(var(--x), var(--y)) scale(1.5);opacity:0}} .glow{animation:glowPulse .8s ease-in-out 4 alternate}@keyframes glowPulse{from{filter:drop-shadow(0 0 0 rgba(255,220,100,.0))}to{filter:drop-shadow(0 0 18px rgba(255,220,100,.95))}} .shake{animation:shake .35s ease-in-out 2}@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}50%{transform:translateX(8px)}75%{transform:translateX(-5px)}}
  </style>
</head>
<body>
  <div class="wrap">
    <h1 class="title-en">Ichancy Bot</h1>
    <h2 class="title-ar">عجلة الحظ الذهبية 🎰</h2>
    <div class="wheel-zone" id="wheelZone">
      <div class="pointer"></div><div class="halo"></div><div class="ring"></div><canvas id="wheelCanvas" width="900" height="900"></canvas><div class="inner-ring"></div><div class="hub"></div><div class="sparkles" id="sparkles"></div>
    </div>
    <div class="card" id="statusCard">اضغط SPIN للدوران!</div>
    <button class="spin-btn" id="spinBtn">↻ SPIN</button>
    <button class="sound-pill" id="soundBtn">🔊 الصوت: يعمل</button>
    <div class="result-box">
      <div class="result" id="result">النتيجة: جاهز</div>
      <div class="note">النتيجة ترسل تلقائياً إلى البوت</div>
    </div>
  </div>
<script>
// Initialize Telegram WebApp
const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

const rewards=[
  {label:"1000",color:"#1d55e8",text:"#fff"},
  {label:"2000",color:"#dff6ff",text:"#1346a8"},
  {label:"10000",color:"#1d55e8",text:"#fff"},
  {label:"20000",color:"#dff6ff",text:"#1346a8"},
  {label:"50000",color:"#1d55e8",text:"#fff"},
  {label:"100000",color:"#dff6ff",text:"#1346a8"},
  {label:"200000",color:"#1d55e8",text:"#fff"},
  {label:"Hard Luck 😭",color:"#dff6ff",text:"#1346a8"}
];

const canvas=document.getElementById('wheelCanvas'), 
      ctx=canvas.getContext('2d'), 
      spinBtn=document.getElementById('spinBtn'), 
      soundBtn=document.getElementById('soundBtn'), 
      resultBox=document.getElementById('result'), 
      wheelZone=document.getElementById('wheelZone'), 
      sparkles=document.getElementById('sparkles'), 
      statusCard=document.getElementById('statusCard');

let rotation=0, spinning=false, soundOn=true, audioCtx=null, tickTimer=null;
const anglePer=360/rewards.length;

function drawWheel(){
  const cx=canvas.width/2, cy=canvas.height/2, r=canvas.width/2 - 6; 
  ctx.clearRect(0,0,canvas.width,canvas.height); 
  rewards.forEach((item,i)=>{
    const startDeg=-90+i*anglePer, endDeg=startDeg+anglePer, 
          start=startDeg*Math.PI/180, end=endDeg*Math.PI/180; 
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath(); 
    ctx.fillStyle=item.color; ctx.fill(); 
    ctx.beginPath(); ctx.moveTo(cx,cy); ctx.arc(cx,cy,r,start,end); ctx.closePath(); 
    ctx.lineWidth=4; ctx.strokeStyle='rgba(255,255,255,.18)'; ctx.stroke(); 
    ctx.save(); ctx.translate(cx,cy); ctx.rotate((start+end)/2); 
    ctx.translate(r*0.68,0); ctx.rotate(Math.PI/2); 
    ctx.textAlign='center'; ctx.textBaseline='middle'; 
    ctx.fillStyle=item.text; 
    ctx.font='bold '+(item.label.includes('Hard') ? 34 : 44)+'px Arial'; 
    if(item.label.includes('Hard')){
      ctx.fillText('Hard',0,-20);ctx.fillText('Luck 😭',0,20);
    } else {ctx.fillText(item.label,0,0);} 
    ctx.restore();
  }); 
  ctx.beginPath(); ctx.arc(cx,cy,r-2,0,Math.PI*2); 
  ctx.lineWidth=10; ctx.strokeStyle='rgba(255,255,255,.32)'; ctx.stroke();
}

function ensureAudio(){
  if(!audioCtx){audioCtx=new (window.AudioContext||window.webkitAudioContext)()} 
  if(audioCtx.state==='suspended') audioCtx.resume()
}

function tone(freq,duration=0.1,type='sine',volume=0.04,endFreq=null){
  if(!soundOn) return; ensureAudio(); 
  const now=audioCtx.currentTime; 
  const osc=audioCtx.createOscillator(); 
  const gain=audioCtx.createGain(); 
  osc.type=type; osc.frequency.setValueAtTime(freq,now); 
  if(endFreq){osc.frequency.exponentialRampToValueAtTime(endFreq,now+duration)} 
  gain.gain.setValueAtTime(0.0001,now); gain.gain.exponentialRampToValueAtTime(volume,now+0.01); 
  gain.gain.exponentialRampToValueAtTime(0.0001,now+duration); 
  osc.connect(gain).connect(audioCtx.destination); osc.start(now); osc.stop(now+duration+0.03);
}

function playTicks(total=5200){
  if(!soundOn) return; clearTimeout(tickTimer); 
  let elapsed=0; 
  function step(){
    const ratio=elapsed/total; tone(860-Math.min(520,ratio*480),0.04,'triangle',0.022); 
    let next=60; if(ratio>.45) next=90; if(ratio>.65) next=120; if(ratio>.82) next=180; 
    elapsed+=next; if(elapsed<total){tickTimer=setTimeout(step,next)}
  } step();
}

function playWin(){
  tone(740,.12,'triangle',.055); 
  setTimeout(()=>tone(980,.14,'triangle',.06),120); 
  setTimeout(()=>tone(1320,.18,'sine',.065),260); 
  if(navigator.vibrate) navigator.vibrate([90,40,120,40,180]);
}

function playLose(){
  tone(280,.18,'sawtooth',.045,160); 
  setTimeout(()=>tone(180,.18,'triangle',.04,120),160); 
  if(navigator.vibrate) navigator.vibrate(120);
}

function addSparkles(){
  sparkles.innerHTML=''; 
  for(let i=0;i<24;i++){
    const el=document.createElement('i'); 
    el.style.left=(45+Math.random()*10)+'%'; el.style.top=(45+Math.random()*10)+'%'; 
    el.style.setProperty('--x',((Math.random()-.5)*360)+'px'); 
    el.style.setProperty('--y',((Math.random()-.5)*320)+'px'); 
    sparkles.appendChild(el)
  } 
  setTimeout(()=>sparkles.innerHTML='',1200);
}

function normalize(x){return ((x%360)+360)%360;}

// MAIN SPIN FUNCTION (called when user clicks SPIN)
function spin(){
  if(spinning) return; 
  spinning=true; 
  spinBtn.disabled=true; 
  wheelZone.classList.remove('glow','shake');
  
  // Pick a random reward
  const randomIndex = Math.floor(Math.random() * rewards.length);
  const selectedReward = rewards[randomIndex];
  
  const idx = rewards.indexOf(selectedReward);
  const targetCenter = idx*anglePer + anglePer/2;
  const finalNorm = 360 - targetCenter;
  const startNorm = normalize(rotation);
  let delta = finalNorm - startNorm;
  if(delta < 0) delta += 360;
  const finalRotation = rotation + 2160 + delta;
  const duration = 5200;
  
  playTicks(duration);
  canvas.style.transition = `transform ${duration}ms cubic-bezier(.14,.9,.13,1)`;
  canvas.style.transform = `rotate(${finalRotation}deg)`;
  
  setTimeout(() => {
    rotation = finalRotation;
    spinning = false;
    
    // Show result
    resultBox.textContent = `النتيجة: ${selectedReward.label}`;
    
    if(selectedReward.label.includes('Hard')){
      wheelZone.classList.add('shake'); 
      playLose();
    } else {
      wheelZone.classList.add('glow'); 
      addSparkles(); 
      playWin();
    }
    
    // SEND RESULT TO TELEGRAM BOT
    const userId = tg.initDataUnsafe?.user?.id || "anonymous";
    const dataToSend = JSON.stringify({
      prize: selectedReward.label,
      userId: userId
    });
    
    tg.sendData(dataToSend);
    
    // Re-enable button after short delay
    setTimeout(() => {
      spinBtn.disabled = false;
      statusCard.textContent = 'اضغط SPIN للدوران مرة أخرى!';
    }, 1000);
  }, duration + 40);
  
  statusCard.textContent = 'جاري الدوران...';
}

// Event listeners
spinBtn.addEventListener('click', spin);

soundBtn.addEventListener('click', () => {
  soundOn = !soundOn; 
  soundBtn.textContent = soundOn ? '🔊 الصوت: يعمل' : '🔇 الصوت: متوقف'; 
  if(soundOn) tone(620,.08,'triangle',.035);
});

// Initial draw
drawWheel();
spinBtn.disabled = false;
statusCard.textContent = 'اضغط SPIN للدوران!';
</script>
</body>
</html>
